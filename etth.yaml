program: run.py
method: bayes
metric:
  goal: minimize
  name: best_test_loss
parameters:
  task_name:
    value: long_term_forecast
  is_training:
    value: 1
  root_path:
    value: ./dataset/ETT-small/
  data_path:
    value: ETTh1.csv
  model_id:
    value: ETTh1_672_96
  model:
    value: M3LLM_Qwen
  data:
    value: ETTh1
  token_len:
    value: 96
  batch_size:
    values: [64, 96,128, 256, 368]
  des:
    value: 'Exp'
  itr:
    value: 1
  multi_var:
    value: True
  mix_embeds:
    value: True
  mix_embeds_type:
    value: v11
  learning_rate:
    value: 0.0005
  mlp_hidden_layers:
    values: [0, 1, 2]
  mlp_hidden_dim:
    values: [512, 768, 1024, 1536, 2048]
  cosine:
    value: True
  train_epochs:
    value: 100
  patience:
    value: 10
  multi_scale:
    value: True
  down_sampling_layers:
    values: [1, 2, 3]
  down_sampling_window:
    values: [2, 3, 4]
  down_sampling_method:
    value: avg
  dropout:
    value: 0.1
  moving_avg:
    values: [13, 15, 17, 19, 21, 23, 25]
  tmax:
    values: [5, 6, 7, 8, 9, 10]
  gpu:
    value: 0
  wandb:
    value: True
early_terminate:
  type: hyperband
  s: 2
  eta: 3
  max_iter: 27
