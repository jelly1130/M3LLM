program: run.py
method: grid
metric:
  goal: maximize
  name: best_test_accuracy
parameters:
  task_name:
    value: classification
  is_training:
    value: 1
  root_path:
    value: ./all_datasets/Classification/UEA/RacketSports
  data_path:
    value: RS
  model_id:
    value: RS
  model:
    value: M3LLM_Qwen
  data:
    value: UEA
  token_len:
    value: 16
  batch_size:
    values: [16, 32, 64, 128, 256]
  des:
    value: 'Exp'
  itr:
    value: 1
  multi_var:
    value: True
  mix_embeds:
    value: True
  mix_embeds_type:
    value: v11
  learning_rate:
    values: [0.0005, 0.0006, 0.0007, 0.0008, 0.0009, 0.001]
  mlp_hidden_layers:
    value: 1
  mlp_hidden_dim:
    value: 512
  cosine:
    value: True
  train_epochs:
    value: 100
  patience:
    value: 10
  multi_scale:
    value: True
  down_sampling_layers:
    value: 1
  down_sampling_window:
    value: 2
  down_sampling_method:
    value: avg
  dropout:
    value: 0.1
  moving_avg:
    value: 13
  tmax:
    values: [5, 6, 7, 8, 9, 10]
  gpu:
    value: 0
  wandb:
    value: True
early_terminate:
  type: hyperband
  s: 2
  eta: 3
  max_iter: 27
